version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React
  - TailwindCSS
  - Vite
routes:
  - path: /
    file: src/pages/LoginPage.jsx
    auth_required: false
    description: Citizen login page
  - path: /employee-login
    file: src/pages/EmployeeLoginPage.jsx
    auth_required: false
    description: Employee login page with Aadhaar OTP eKYC
  - path: /cm-dashboard
    file: src/portals/cm/CmDashboard.jsx
    auth_required: true
    description: Chief Minister dashboard overview
  - path: /mla-dashboard
    file: src/portals/mla/MlaDashboard.jsx
    auth_required: true
    description: MLA dashboard for constituency stats and tickets
  - path: /minister-dashboard
    file: src/portals/minister/MinisterDashboard.jsx
    auth_required: true
    description: Department Minister dashboard
  - path: /collector-dashboard
    file: src/pages/EmployeeDashboard.jsx
    auth_required: true
    description: District Collector dashboard
  - path: /bdo-dashboard
    file: src/pages/EmployeeDashboard.jsx
    auth_required: true
    description: Block Development Officer dashboard
  - path: /vao-dashboard
    file: src/pages/EmployeeDashboard.jsx
    auth_required: true
    description: Village Administrative Officer dashboard
  - path: /ward-officer-dashboard
    file: src/pages/EmployeeDashboard.jsx
    auth_required: true
    description: Ward Officer dashboard
  - path: /ri-dashboard
    file: src/pages/EmployeeDashboard.jsx
    auth_required: true
    description: Revenue Inspector dashboard
features:
  - name: Citizen Login
    description: Citizen Aadhaar verification and login
    files:
      - src/pages/LoginPage.jsx
    entry_route: /
    user_interactions:
      - Enter phone number
      - Click Send OTP
      - Enter 6-digit OTP
      - Click Verify OTP
      - Enter Name
      - Enter Pincode and select location
      - Click login
    api_calls:
      - method: POST
        endpoint: /api/auth/citizen/login
    auth_required: false
  - name: Employee Login & Scoping
    description: Employee Aadhaar login and role/jurisdiction scoping onboarding
    files:
      - src/pages/EmployeeLoginPage.jsx
    entry_route: /employee-login
    user_interactions:
      - Enter Aadhaar number
      - Click Send OTP
      - Enter 6-digit OTP (123456)
      - Select Category (Elected Representative, Administrative Officer, Department Official)
      - Select Role (CM, Minister, MLA, Ward Member, Collector, DRO, BDO, VAO, Ward Officer, RI)
      - Select Portfolio/Jurisdiction (Constituency, Department, District, Ward, Block, etc.)
      - Click Save Scope and Access Dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/employee/aadhaar-login
    auth_required: false
known_limitations: []
